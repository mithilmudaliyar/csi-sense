; Optional PlatformIO wrapper for building the ESP32-CSI-Tool firmware.
;
; The PRIMARY supported path is standalone ESP-IDF (`idf.py`) — see
; docs/flashing-guide.md. This file is a convenience for those who prefer
; PlatformIO. Building will download the espidf platform + Xtensa toolchain
; (~1 GB) on first run.
;
; Two environments mirror the two roles:
;   env:rx_sta  -> Active STA / CSI-logging receiver (flash onto 2 boards)
;   env:tx_ap   -> Active AP / packet transmitter    (flash onto 1 board)
;
; NOTE: ESP32-CSI-Tool uses per-project sdkconfig (menuconfig). With
; PlatformIO+espidf you configure via `pio run -t menuconfig -e <env>`.

[platformio]
; Each role is its own ESP-IDF project directory.
default_envs = rx_sta
src_dir = esp32-csi-tool    ; vendored roles live at esp32-csi-tool/<role>/main/

[env]
platform = espressif32
framework = espidf
board = esp32dev            ; ESP32-WROOM-32 dev board
monitor_speed = 921600      ; MUST match the firmware UART console baud
upload_speed = 921600
; CP2102 USB-UART: the OS assigns a COMx port; set it explicitly if needed.
; monitor_port = COM5
; upload_port = COM5

[env:rx_sta]
; Active STA receiver — collects + prints CSI. Flash onto the 2 RX boards.
; Build from the active_sta project (set SHOULD_COLLECT_CSI = y in menuconfig).
build_src_filter = +<active_sta/main/>

[env:tx_ap]
; Active AP transmitter — emits packets so the RX nodes have CSI to capture.
; Build from the active_ap project (SHOULD_COLLECT_CSI = n).
build_src_filter = +<active_ap/main/>
